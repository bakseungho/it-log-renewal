<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- 라이트 모드용 (어두운 색상의 파비콘) -->
  <link rel="icon" href="/images/common/favicon_light.ico" sizes="any">
  <!-- 다크 모드용 (밝은 색상의 파비콘) -->
  <link rel="icon" href="/images/common/favicon_dark.ico" media="(prefers-color-scheme: dark)" />
  

  <title>404 - 페이지를 찾을 수 없습니다 | 아이티로그</title>
  
  <!-- Fonts -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/common.css">
  <link rel="stylesheet" href="/css/components.css">
  
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-primary);
      padding: 40px 20px;
    }
    
    .error-content {
      text-align: center;
      max-width: 600px;
    }
    
    .error-code {
      font-size: 120px;
      font-weight: var(--font-weight-black);
      color: var(--color-accent-gold);
      line-height: 1;
      margin-bottom: 24px;
    }
    
    .error-title {
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-primary);
      margin-bottom: 16px;
    }
    
    .error-description {
      font-size: var(--font-size-body-lg);
      color: var(--color-text-secondary);
      line-height: var(--line-height-body);
      margin-bottom: 48px;
    }
    
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
    }
    
    @media (max-width: 767px) {
      .error-code {
        font-size: 80px;
      }
      
      .error-title {
        font-size: 24px;
      }
      
      .error-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">페이지를 찾을 수 없습니다</h1>
      <p class="error-description">
        요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>
        주소를 다시 확인해주세요.
      </p>
      <div class="error-actions">
        <a href="/index.html" class="btn btn-primary">홈으로 돌아가기</a>
      </div>
    </div>
  </div>
</body>
</html>
