<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="(주)아이티로그 웹사이트 - 라이트/다크 테마 선택">
  <title>(주)아이티로그 - 테마 선택</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0066FF 0%, #00A8E8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 1000px;
      width: 100%;
    }

    .header {
      text-align: center;
      margin-bottom: 60px;
      color: white;
    }

    .logo {
      width: 180px;
      height: auto;
      margin-bottom: 24px;
      filter: brightness(0) invert(1);
    }

    .header h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.2);
    }

    .header p {
      font-size: 20px;
      opacity: 0.95;
      font-weight: 400;
      line-height: 1.6;
    }

    .templates {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 32px;
      margin-bottom: 40px;
    }

    .template-card {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .template-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    .template-preview {
      height: 240px;
      background-size: cover;
      background-position: center;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .template-preview::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.2) 100%);
    }

    .preview-icon {
      position: relative;
      z-index: 1;
      font-size: 64px;
      opacity: 0.9;
    }

    .light-theme .template-preview {
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
    }

    .light-theme .preview-icon {
      color: #0066FF;
    }

    .dark-theme .template-preview {
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      position: relative;
    }

    .dark-theme .template-preview::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(77, 159, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 50%, rgba(0, 229, 255, 0.15) 0%, transparent 50%);
      z-index: 0;
    }

    .dark-theme .preview-icon {
      color: #4D9FFF;
    }

    .template-content {
      padding: 36px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .template-badge {
      display: inline-block;
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 20px;
      width: fit-content;
    }

    .light-theme .template-badge {
      background: linear-gradient(135deg, #0066FF 0%, #00A8E8 100%);
      color: white;
    }

    .dark-theme .template-badge {
      background: linear-gradient(135deg, #4D9FFF 0%, #00E5FF 100%);
      color: #0a0a0a;
    }

    .template-title {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }

    .template-description {
      font-size: 16px;
      color: #4a4a4a;
      line-height: 1.7;
      margin-bottom: 28px;
      flex: 1;
    }

    .template-features {
      list-style: none;
      margin-bottom: 28px;
    }

    .template-features li {
      font-size: 15px;
      color: #6b6b6b;
      padding: 8px 0;
      padding-left: 28px;
      position: relative;
    }

    .template-features li::before {
      content: '✓';
      position: absolute;
      left: 0;
      font-weight: 700;
      font-size: 18px;
    }

    .light-theme .template-features li::before {
      color: #0066FF;
    }

    .dark-theme .template-features li::before {
      color: #4D9FFF;
    }

    .template-link {
      display: block;
      text-align: center;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: all 0.3s ease;
      color: white;
    }

    .light-theme .template-link {
      background: linear-gradient(135deg, #0066FF 0%, #00A8E8 100%);
    }

    .light-theme .template-link:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(0, 102, 255, 0.4);
    }

    .dark-theme .template-link {
      background: linear-gradient(135deg, #4D9FFF 0%, #00E5FF 100%);
      color: #0a0a0a;
    }

    .dark-theme .template-link:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(77, 159, 255, 0.4);
    }

    .footer {
      text-align: center;
      color: white;
      opacity: 0.9;
      font-size: 14px;
      margin-top: 48px;
    }

    .footer p {
      margin-bottom: 8px;
    }

    .footer a {
      color: white;
      text-decoration: none;
      opacity: 0.9;
      transition: opacity 0.3s ease;
    }

    .footer a:hover {
      opacity: 1;
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .header h1 {
        font-size: 32px;
      }

      .header p {
        font-size: 16px;
      }

      .templates {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .template-preview {
        height: 200px;
      }

      .preview-icon {
        font-size: 48px;
      }

      .template-content {
        padding: 28px;
      }

      .template-title {
        font-size: 26px;
      }

      .template-description {
        font-size: 15px;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .template-card {
      animation: fadeInUp 0.6s ease forwards;
      opacity: 0;
    }

    .template-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .template-card:nth-child(2) {
      animation-delay: 0.2s;
    }
  </style>
</head>
